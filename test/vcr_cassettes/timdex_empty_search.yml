        the Ecosystem.\" Proc. SPIE 9772, Broadband Access Communication Technologies
        X, 12 February, 2016, San Francisco, CA, 2016, p. 977202."},{"timdexRecordId":"dspace:1721.1-149103","identifiers":[{"kind":"uri","value":"https://hdl.handle.net/1721.1/149103"}],"title":"Dataflow
        Architectures","source":"DSpace@MIT","contentType":["Not specified"],"contributors":[{"kind":"author","value":"Arvind"},{"kind":"author","value":"Culler,
        David E."}],"publicationInformation":null,"dates":[{"kind":"Publication date","value":"2/12/86","range":null}],"links":[{"kind":"Digital
        object URL","restrictions":null,"text":"Digital object URL","url":"https://hdl.handle.net/1721.1/149103"}],"notes":null,"highlight":null,"provider":null,"rights":null,"sourceLink":"https://dspace.mit.edu/handle/1721.1/149103","summary":["Dataflow
        graphs are described as a machine language for parallel machines. Static and
        dynamic dataflow architectures are presented as two implementations of the
        abstract dataflow model. Static dataflow allows at most one token per arc
        in dataflow graphs and thus only approximates the abstract model where unbounded
        token storage per arc is assumed. Dynamic architectures tag each token and
        keep then in a common pool storage, thus permitting a better approximation
        of the abstract model. The relative merits of the two approaches are discussed.
        Functional data structures and I-structures are presented as two views of
        data structures which are both compatible with the dataflow model. These views
        are contrasted and compared in regard to efficiency and exploitation of potential
        parallelism in programs. A discussion of major dataflow projects and a prognosis
        for dataflow architectures are also presented."],"subjects":null,"citation":"Arvind,
